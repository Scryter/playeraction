name: HLS Video Processor

on:
  schedule:
    - cron: '*/10 * * * *'   # every 10 minutes
  workflow_dispatch:           # manual trigger / webhook trigger from app

# Minimal GITHUB_TOKEN permissions — this job only reads the repo
permissions:
  contents: read

jobs:
  process-hls:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 30

    steps:
      # Pinned to commit SHA to prevent tag-poisoning supply chain attacks
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af  # v4.1.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        # node-fetch removed — Node 20 has native fetch; @aws-sdk/client-s3 only
        run: npm install --omit=dev

      - name: Cache FFmpeg binary
        id: cache-ffmpeg
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/ffmpeg
          key: ffmpeg-static-amd64-v1

      - name: Install FFmpeg (static binary, skip if cached)
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        run: |
          wget -q https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz
          tar -xf ffmpeg-release-amd64-static.tar.xz
          sudo mv ffmpeg-*-static/ffmpeg /usr/local/bin/ffmpeg
          rm -rf ffmpeg-*-static ffmpeg-release-amd64-static.tar.xz

      - name: Run HLS processor
        env:
          R2_ACCOUNT_ID:        ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME:       ${{ secrets.R2_BUCKET_NAME }}
          APP_URL:              ${{ secrets.APP_URL }}
          PROCESSOR_API_KEY:    ${{ secrets.PROCESSOR_API_KEY }}
        run: node scripts/processor.js
